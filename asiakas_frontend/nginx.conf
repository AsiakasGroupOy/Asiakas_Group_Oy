server {
    listen 80;
    server_name soitto.ai www.soitto.ai;
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
    }

server {
    listen 443 ssl;
    server_name soitto.ai www.soitto.ai;

    # The paths below MUST match where the files are on your server
    ssl_certificate /etc/letsencrypt/live/soitto.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soitto.ai/privkey.pem;

    # Optimization for SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    # Serve Static Frontend Files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Gunicorn Backend
    location /api {
        proxy_pass http://backend:5000; # 'backend' is your service name
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts for production
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}